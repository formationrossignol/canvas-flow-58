name: Deploy React App to FTP

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Récupérer le code source
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Configurer Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    # 3. Installer les dépendances
    - name: Install dependencies
      run: npm ci
    
    # 5. Build du projet React avec Vite
    - name: Build React app
      run: npm run build
    
    # 6. Vérifier que le build a généré les fichiers
    - name: List build files
      run: ls -la dist/

    - name: Test secrets accessibility
      run: |
        if [ -z "${{ secrets.FTP_HOST }}" ]; then
          echo "❌ FTP_HOST is empty or not set"
        else
          echo "✅ FTP_HOST is set"
        fi
        
        if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
          echo "❌ FTP_USERNAME is empty or not set"  
        else
          echo "✅ FTP_USERNAME is set"
        fi
        
        if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
          echo "❌ FTP_PASSWORD is empty or not set !"
        else
          echo "✅ FTP_PASSWORD is set"
        fi
    
    # 7. Déployer vers FTP
    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: /www/azenro/
        log-level: verbose
